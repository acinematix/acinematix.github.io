<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Measure Of It All — Aman Malik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .doc-title {
      padding: 140px 48px 60px;
      text-align: center;
    }

    .doc-title h1 {
      font-family: var(--font-display);
      font-size: 3rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text);
    }

    .doc-title .subtitle {
      margin-top: 20px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--color-text-muted);
    }

    .doc-hero {
        width: 100%;
        background-color: #000;
        line-height: 0;
        padding: 20px 0;
    }

    .doc-hero img {
      width: 100%;
      display: block;
    }

    .doc-status {
      padding: 60px 48px;
      text-align: center;
    }

    .doc-status p {
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .stills-grid {
      padding: 20px 48px 80px;
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .still-item {
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .still-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .still-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      aspect-ratio: 16 / 10;
      transition: transform 0.5s ease;
    }

    .still-item:hover img {
      transform: scale(1.03);
    }

    @media (max-width: 900px) {
      .doc-title { padding: 100px 24px 40px; }
      .doc-title h1 { font-size: 2rem; }
      .doc-status { padding: 40px 24px; }
      .stills-grid { padding: 16px 24px 60px; gap: 16px; }
    }

    @media (max-width: 600px) {
      .doc-title { padding: 80px 18px 32px; }
      .doc-title h1 { font-size: 1.5rem; letter-spacing: 0.06em; }
      .stills-grid { padding: 12px 18px 40px; grid-template-columns: 1fr; gap: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="../../index.html" class="logo">Aman Malik</a>
    <nav>
      <a href="../../index.html">Home</a>
      <a href="../../about.html">About</a>
      <div class="catalog-dropdown">
        <a href="#" class="active">Catalog</a>
        <div class="catalog-menu">
          <a href="../portrait.html">Portrait</a>
          <a href="../landscape.html">Landscape</a>
          <a href="../street.html">Street</a>
          <a href="../portfolio.html">Portfolio</a>
        </div>
      </div>
      <a href="https://instagram.com/acinematix" target="_blank" rel="noopener" aria-label="Instagram">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      </a>
      <a href="mailto:acinematix@gmail.com" aria-label="Email">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,4 12,13 2,4"/></svg>
      </a>
    </nav>
    <button class="hamburger" aria-label="Menu" onclick="toggleMenu()"><span></span><span></span><span></span></button>
  </header>

  <div class="mobile-nav" id="mobileNav">
    <a href="../../index.html" onclick="toggleMenu()">Home</a>
    <a href="../../about.html" onclick="toggleMenu()">About</a>
    <a href="../portrait.html" class="mobile-sub" onclick="toggleMenu()">Portrait</a>
    <a href="../landscape.html" class="mobile-sub" onclick="toggleMenu()">Landscape</a>
    <a href="../street.html" class="mobile-sub" onclick="toggleMenu()">Street</a>
    <a href="../portfolio.html" class="mobile-sub" onclick="toggleMenu()">Portfolio</a>
    <div class="mobile-nav-icons">
      <a href="https://instagram.com/acinematix" target="_blank" rel="noopener" aria-label="Instagram">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      </a>
      <a href="mailto:acinematix@gmail.com" aria-label="Email">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,4 12,13 2,4"/></svg>
      </a>
    </div>
  </div>

  <section class="doc-title">
    <h1>The Measure Of It All</h1>
    <p class="subtitle">a short-form documentary</p>
  </section>

  <div class="doc-hero">
    <img src="../../images/portfolio/measure/hero.jpg" alt="The Measure Of It All">
  </div>

  <section class="doc-status">
    <p>Documentary Under Construction</p>
  </section>

  <main class="stills-grid">
    <div class="still-item"><img src="../../images/portfolio/measure/still-1.jpg" alt="Still 1" loading="lazy"></div>
    <div class="still-item"><img src="../../images/portfolio/measure/still-2.jpg" alt="Still 2" loading="lazy"></div>
    <div class="still-item"><img src="../../images/portfolio/measure/still-3.jpg" alt="Still 3" loading="lazy"></div>
    <div class="still-item"><img src="../../images/portfolio/measure/still-4.jpg" alt="Still 4" loading="lazy"></div>
    <div class="still-item"><img src="../../images/portfolio/measure/still-5.jpg" alt="Still 5" loading="lazy"></div>
    <div class="still-item"><img src="../../images/portfolio/measure/still-6.jpg" alt="Still 6" loading="lazy"></div>
    <div class="still-item"><img src="../../images/portfolio/measure/still-7.jpg" alt="Still 7" loading="lazy"></div>
    <div class="still-item"><img src="../../images/portfolio/measure/still-8.jpg" alt="Still 8" loading="lazy"></div>
  </main>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const grid = entry.target.closest('.stills-grid');
          if (grid) {
            const items = Array.from(grid.querySelectorAll('.still-item'));
            const index = items.indexOf(entry.target);
            const col = index % 2;
            entry.target.style.transitionDelay = (col * 0.1) + 's';
          }
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

    document.querySelectorAll('.still-item').forEach(item => observer.observe(item));

    function toggleMenu() {
      document.querySelector('.hamburger').classList.toggle('open');
      const nav = document.getElementById('mobileNav');
      nav.classList.toggle('open');
      document.body.style.overflow = nav.classList.contains('open') ? 'hidden' : '';
    }
  </script>
</body>
</html>
